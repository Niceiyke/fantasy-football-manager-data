name: Update Latest Finished GW

on:
  workflow_dispatch:
    inputs:
      season:
        description: Season folder
        required: false
      gw:
        description: Optional explicit gameweek number
        required: false
  schedule:
    - cron: "30 8 * * 4"
    - cron: "30 8 * * 2"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh latest finished GW
        run: |
          if [ -n "${{ github.event.inputs.gw }}" ]; then
            if [ -n "${{ github.event.inputs.season }}" ]; then
              python automation.py rebuild-latest --season "${{ github.event.inputs.season }}" --gw "${{ github.event.inputs.gw }}"
            else
              python automation.py rebuild-latest --gw "${{ github.event.inputs.gw }}"
            fi
          else
            if [ -n "${{ github.event.inputs.season }}" ]; then
              python automation.py rebuild-latest --season "${{ github.event.inputs.season }}"
            else
              python automation.py rebuild-latest
            fi
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*/players_raw.csv data/*/cleaned_players.csv data/*/fixtures.csv data/*/teams.csv data/*/gws/*.csv
          git add automation.py update_gameweek.py update_fixtures.py .github/workflows/*.yml
          git diff --cached --quiet || git commit -m "Update latest finished gameweek"
          git push
